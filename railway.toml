# Full-stack deploy (web + API) from repo root.
# For mobile/API-only: set Railway Root Directory to "server" instead — see deploy/railway/DEPLOY_RAILWAY.md

[build]
builder = "NIXPACKS"
buildCommand = "npm install --prefix server && npm install --prefix client --include=dev && npm run build --prefix client"

[deploy]
startCommand = "NODE_ENV=production npm start --prefix server"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
